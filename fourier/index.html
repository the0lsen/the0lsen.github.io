<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Fourier Wave Visualizer — Theo Olsen</title>
  <meta name="description" content="An interactive Fourier circle visualizer by Theodor Olsen (Theo Olsen), musician and astronomy researcher — explore musical chords as orbiting epicycles with historical tuning systems and live audio.">
  <meta name="keywords" content="Theo Olsen, Theodor Olsen, musician, music, astronomy researcher, Fourier visualizer, science communication">
  <meta name="author" content="Theodor Olsen, Theo Olsen">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0f1117">
  <link rel="canonical" href="https://the0lsen.github.io/fourier/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://the0lsen.github.io/fourier/">
  <meta property="og:title" content="Fourier Wave Visualizer — Theodor Olsen (Theo Olsen)">
  <meta property="og:description" content="Interactive harmonic circle orbits by musician and astronomy researcher Theodor Olsen (Theo Olsen) — play chords and watch Fourier synthesis in real time.">
  <meta property="og:image" content="https://the0lsen.github.io/assets/photo.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Fourier Wave Visualizer — Theodor Olsen (Theo Olsen)">
  <meta name="twitter:description" content="Interactive harmonic circle orbits by musician and astronomy researcher Theodor Olsen (Theo Olsen) — play chords and watch Fourier synthesis in real time.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="rotate-overlay">
    <div id="rotate-content">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="14" height="12" rx="2" transform="rotate(0 9 12)"/>
        <path d="M18 9l3 3-3 3"/>
        <path d="M14 12h7"/>
      </svg>
      <p class="rotate-title">Rotate your device</p>
      <p class="rotate-sub">The visualizer needs landscape mode</p>
    </div>
  </div>

  <div id="app">

    <header id="header">
      <div id="header-title">
        <div class="orbit-icon"></div>
        <div>
          <h1>Fourier Wave Visualizer</h1>
          <div class="subtitle">Harmonic Circle Orbits</div>
        </div>
      </div>

      <div id="header-controls">

        <div class="ctrl-group">
          <label class="ctrl-label" for="tuning-select">Tuning</label>
          <select id="tuning-select">
            <option value="just" selected>Just Intonation</option>
            <option value="equal">Equal Temperament</option>
            <option value="pythagorean">Pythagorean</option>
            <option value="meantone">¼-Comma Meantone</option>
            <option value="werckmeister">Werckmeister III</option>
            <option value="kirnberger">Kirnberger III</option>
            <option value="young">Young Well Temp.</option>
            <option value="french">French Classical</option>
          </select>
        </div>

        <div class="ctrl-group">
          <label class="ctrl-label" for="timbre-select">Timbre</label>
          <select id="timbre-select">
            <option value="sine">Sine</option>
            <option value="strings">Strings</option>
            <option value="flute">Flute</option>
          </select>
        </div>

        <div class="ctrl-group toggle-wrap">
          <label class="ctrl-label" for="overtone-toggle">Overtones</label>
          <label class="toggle">
            <input type="checkbox" id="overtone-toggle">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="ctrl-group">
          <label class="ctrl-label" for="speed-slider">Speed</label>
          <input type="range" id="speed-slider" min="0.1" max="20.0" step="0.1" value="1.0">
        </div>

        <button id="btn-reset">Reset</button>

      </div>
    </header>

    <div id="main-area">

      <section id="fourier-panel" aria-label="Fourier circle orbits">
        <div class="panel-label">Fourier Orbits</div>
        <canvas id="fourier-canvas"></canvas>
      </section>

      <button id="waves-toggle" aria-label="Toggle individual waves panel">Waves</button>

      <aside id="waves-panel" aria-label="Individual note waveforms">
        <div id="waves-panel-header">Individual Waves</div>
        <div id="waves-list">
          <div id="waves-empty">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
            </svg>
            <span>Click a key to<br>add a note</span>
          </div>
        </div>
      </aside>

    </div>

    <section id="trail-panel" aria-label="Combined waveform trail">
      <div class="panel-label">Combined Waveform</div>
      <canvas id="trail-canvas"></canvas>
    </section>

    <section id="keyboard-panel" aria-label="Piano keyboard">
      <div id="keyboard-container"></div>
    </section>

  </div>

  <script type="module">
    import { initApp } from "./js/app.js?v=4"
    initApp()
  </script>
  <script>
    document.getElementById('waves-toggle').addEventListener('click', () => {
      document.getElementById('waves-panel').classList.toggle('open');
    });
  </script>
</body>
</html>
